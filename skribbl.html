<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Test 1: Name the Drawing</title>
  <link rel="stylesheet" href="skribbl.css">
</head>

<body>
  <div class="wrap">

    <!-- Logo -->
    <div class="top-logo">
      <img src="logo.gif"
           alt="Logo"
           onerror="this.onerror=null;this.src='image1.png'">
    </div>

    <div class="card" role="main">

      <div class="stage" id="stage">

        <!-- Drawing -->
        <div class="drawing-wrapper" style="position:relative;width:100%;">
          <div class="drawing" id="drawing-container">
            <img id="drawing-img" src="image1.png" alt="drawing">
          </div>
        </div>

        <!-- Controls -->
        <div style="width:100%">
          <div class="controls">
            <input
              id="answer-input"
              type="text"
              placeholder="Type your answer here"
              autocomplete="off">
            <button id="submit-btn">Submit</button>
          </div>

          <div class="msg" id="message"></div>

          <div class="hint" id="hint">
            I wonder why Ali would draw this ?
          </div>
        </div>

        <!-- FINAL SCREEN -->
        <div class="final" id="final-screen" aria-hidden="true">

          <div id="final-answers"
               style="font-size:20px;color:var(--accent);font-weight:700">
          </div>

          <div style="margin-top:12px;text-align:center;">
            <p>Hey... Ferdawss, you got the drawings.</p>
            <p>I hope you figured out the key...</p>

            <input id="finalKey"
                   type="text"
                   placeholder="The key..."
                   style="padding:8px 10px;border-radius:6px;">

            <button id="final-submit"
                    style="margin-left:8px;padding:8px 12px;">
              Submit
            </button>
          </div>

        </div>

      </div>
    </div>
  </div>

  <script src="skribbl.js"></script>
</body>
</html>
